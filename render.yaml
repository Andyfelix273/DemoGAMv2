services:
  - type: web
    name: gis-asset-manager
    runtime: python
    buildCommand: pip install -r requirements.txt && python init_db.py && python migrate_thresholds.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
